  permission_network_desc: Opens network connections, such as to a local SDK or server. A malicious script could send data from this computer.
  permission_os_desc: Reads the system clock (os.time / os.clock). This is low risk and does not grant access to files or processes.
  permission_secure_storage_desc: Reads this plugin's own saved secret values (e.g. an API token) in clear text while it runs.
  permission_smbus_desc: Scans, reads, and writes SMBus/I2C devices. This reaches every device on the bus, not just this plugin's own hardware, so a bad write can destabilize other devices.
  permission_audio_routing_desc: Creates and routes host audio sinks. A malicious script could spawn audio modules or capture/redirect audio on this machine.
