  download_consent_title: Download official plugins?
  download_consent_body: Official HaloDaemon plugins are hosted on GitHub. To protect your privacy, HaloDaemon makes no network requests for them unless you explicitly allow it.
  download_consent_note: If allowed, HaloDaemon downloads official plugins automatically and periodically checks GitHub for updates. If not allowed, it never contacts GitHub and you must add plugins manually. You can change this anytime in Settings.
