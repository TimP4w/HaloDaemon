depcheck:
  title: Some checks need your attention
  intro: HaloDaemon found problems that may prevent some devices or features from working correctly.
  dont_show_again: Don't show this again on startup
  got_it: Got it
  required: Required
  optional: Optional
  impact: Impact
  how_to_fix: How to fix
  rules:
    ffmpeg:
      title: ffmpeg
      impact: Video playback on LCD screens
      fix: Install ffmpeg and make sure it is on PATH
    pactl:
      title: pactl
      impact: "Headset ChatMix: game/chat audio split via virtual sinks"
      fix: Install PipeWire or PulseAudio utilities (provides pactl)
    nvidia_smi:
      title: nvidia-smi
      impact: NVIDIA GPU temperature monitoring
      fix: This is only required for NVIDIA GPUs and is included with the proprietary driver
    udev_rules:
      title: udev rules
      impact: Access to HID and hwmon devices without root privileges
      fix: Install udev/60-halod.rules, then reload udev
    i2c_access:
      title: I2C access
      impact: Chipset SMBus RGB (DRAM and GPU)
      fix: Load the i2c-dev module and add your user to the 'i2c' group
    halod_group:
      title: halod group membership
      impact: Fan and pump control without root privileges
      fix: "Add your user to the 'halod' group, then sign out and back in"
    powerprofilesctl:
      title: powerprofilesctl
      impact: System power-profile switching
      fix: Install power-profiles-daemon (provides powerprofilesctl)
    xdg_desktop_portal:
      title: xdg-desktop-portal
      impact: Screen capture for ambient (screen-sampling) RGB effects
      fix: Install xdg-desktop-portal and a backend for your desktop (e.g. xdg-desktop-portal-gtk, -kde, or -wlr)
    pawnio:
      title: PawnIO
      impact: "Chipset SMBus access (DRAM RGB, motherboard sensors)"
      fix: Install PawnIO from pawnio.eu
    broker:
      title: Elevated broker
      impact: "Chipset SMBus access (DRAM RGB, motherboard sensors, some GPU RGB)"
      fix: Reinstall HaloDaemon so the elevated broker service (HalodBroker) is registered
    gnome_extension:
      title: GNOME Shell extension
      impact: Profile switching based on the app in focus on GNOME
      fix_disabled: "Installed but disabled, enable it in the Extensions app"
      fix_missing: Install and enable the HaloDaemon GNOME Shell extension
