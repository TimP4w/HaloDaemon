settings:
  log_level: Log Level
  language: Language

notify:
  error_title: Error
  unknown_error: Unknown error
  engine_stopped:
    title: Engine stopped
    message: "%{detail}"
  key_remap_unavailable:
    title: Key remapping unavailable
    message: "Could not initialize the action system: %{detail}"
  wireless_reinit_failed:
    title: Device did not return to wireless
    message: "%{device} did not come online after 6 attempts to reinitialize its wireless connection."
  device_reconnect_failed:
    title: Device did not reconnect
    message: "%{device} was not ready after 6 reconnection attempts."
  profile_switched:
    title: Profile switched
    message: "Now using '%{profile}'"
  chain_link_restore_failed:
    title: "Could not restore chain link \"%{name}\""
    message: "%{detail}. The link was removed from the saved layout."
  device_init_failed:
    title: "Failed to initialize %{device}"
    message: "%{detail}"
  fan_stalled:
    title: "Fan stalled: %{fan}"
    message: "Fan is not spinning (0 RPM) while the curve duty is applied. Check fan connections or replace the fan."
  plugin_needs_permission:
    title: Plugin needs permission
    message: "%{plugin} requires permissions you haven't granted yet. Open the Plugins screen to review and grant or remove it."
  plugin_content_changed:
    title: Plugin changed on disk
    message: "%{plugin}'s files changed on disk, so it was disabled for safety. Open the Plugins screen to review and re-enable it."
  plugin_runtime_error:
    title: "An error occurred in plugin %{plugin}"
    message: "Open Details for the full error."
  plugin_connect_failed:
    title: "Plugin can't connect: %{plugin}"
    message: "It couldn't reach its configured address. Open Details for more."

tray:
  open: Open HaloDaemon
  quit: Quit
  tooltip: HaloDaemon
  profile: Profile
