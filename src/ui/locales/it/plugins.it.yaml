  consent_modified: Lo script del plugin è cambiato dopo l'ultima autorizzazione. Controlla di nuovo i permessi.
  consent_permission_added: Un aggiornamento del plugin ha aggiunto un nuovo permesso. Per poterlo usare di nuovo, controlla le richieste qui sotto e concedi il nuovo permesso.
