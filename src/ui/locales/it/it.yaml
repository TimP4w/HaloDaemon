  plugins_page_sub: I plugin consigliati sono già selezionati. Controlla l'accesso al sistema richiesto da ciascuno prima di attivarlo.
  plugins_loading: Il download dei plugin ufficiali è ancora in corso. Potrai attivarli in seguito dalla scheda Plugin.
  plugins_error: Impossibile scaricare i plugin ufficiali. Controlla la connessione a Internet e riprova.
  plugins_retry: Riprova
  plugins_retrying: Nuovo tentativo di download dei plugin ufficiali…
  permissions_none: Non richiede accesso aggiuntivo al sistema.
  done_title: Tutto pronto
