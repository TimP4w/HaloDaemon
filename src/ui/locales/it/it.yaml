onboarding:
  welcome_title: Benvenuto in HaloDaemon
  welcome_body: "Gestisci luci, ventole, pompe e sensori da un unico posto. Sarà tutto pronto in circa un minuto."
  health_title: Stato del sistema
  health_sub: HaloDaemon verifica l'accesso al sistema necessario per gestire l'hardware. Gli elementi opzionali mancanti disabilitano solo le funzioni associate.
  health_checking: Controllo del sistema…
  health_ok: Il sistema è pronto.
  prefs_title: Alcune preferenze
  prefs_sub: Puoi modificarle in qualsiasi momento dalle Impostazioni.
  tray_title: Chiudi nell'area di notifica
  tray_desc: Nascondi la finestra invece di uscire dall'applicazione quando premi il pulsante di chiusura.
