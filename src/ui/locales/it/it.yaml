    title: "Il plugin non si connette: %{plugin}"
    message: "Non è riuscito a raggiungere l'indirizzo configurato. Apri Dettagli per saperne di più."

  plugin_recommended:
    title: Plugin consigliato disponibile
    message: "%{plugin} è consigliato per questo sistema. Apri Plugin per attivarlo."

