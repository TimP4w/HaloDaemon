name: Create Release

# Triggered manually to cut a new release in the correct order:
#   1. commit      — create and push the immutable version commit
#   2. test/build  — checkout that exact SHA on Linux and Windows
#   3. package     — package only binaries built from that SHA
#   4. tag/publish — tag the tested SHA and attach all artifacts

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Type of version bump"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      plugin_branch:
        description: "Official plugin branch containing the release commit"
        required: true
        default: "main"
        type: string
      plugin_commit:
        description: "Full SHA of the signed official plugin repository commit"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ── Calculate version ────────────────────────────────────────────
  # Lightweight — reads Cargo.toml, computes the new version string.
  # Runs first so both test jobs can start immediately.
  version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.calc.outputs.new }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: main

      - name: Calculate new version
        id: calc
        run: |
          CURRENT=$(grep -oP '^version = "\K[^"]+' src/Cargo.toml | head -1)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.version_type }}" in
            major)
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor)
              MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch)
              PATCH=$((PATCH + 1)) ;;
          esac
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "Current: $CURRENT → New: $NEW"

  # ── Test (Linux) ─────────────────────────────────────────────────
  # Run the full test suite + clippy first (fail fast), then build the
  # release binaries and cache them for the tarball packaging step.
  test-linux:
    needs: [prepare, prepare-plugins]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - name: Download embedded plugin bundle
        uses: actions/download-artifact@v8.0.1
        with:
          name: official-plugin-bundle
          path: plugin-bundle

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libhidapi-dev libusb-1.0-0-dev libpipewire-0.3-dev libudev-dev \
            libwayland-dev libxkbcommon-dev libdbus-1-dev \
            clang libclang-dev pkg-config

      - name: Install cargo-about
        run: cargo install --locked --features cli cargo-about

      - name: Test + clippy
        working-directory: src
        run: |
          cargo test --workspace
          cargo clippy --workspace --all-targets -- -D warnings

      - name: Build release binaries
        working-directory: src
        env:
          HALOD_REQUIRE_LICENSES: "1"
          HALOD_REQUIRE_PLUGIN_BUNDLE: "1"
          HALOD_OFFICIAL_PLUGIN_BUNDLE: ${{ github.workspace }}/plugin-bundle/official-plugins.bundle
          HALOD_OFFICIAL_PLUGIN_LICENSES: ${{ github.workspace }}/plugin-bundle/official-plugins-licenses.txt
        run: |
          cargo build --release --workspace
          CARGO_TARGET_DIR=target/plugin-test \
            cargo build --release -p halod --features plugin-test

      - name: Stage plugin tooling
        run: |
          mkdir plugin-tools-linux
          cp src/target/release/halod-plugin-signing \
            plugin-tools-linux/halod-plugin-signing-linux-x64
          cp src/target/plugin-test/release/halod \
            plugin-tools-linux/halod-plugin-test-linux-x64

      - name: Upload plugin tools
        uses: actions/upload-artifact@v7.0.1
        with:
          name: plugin-tools-linux
          path: plugin-tools-linux/*

      - name: Upload release binaries
        uses: actions/upload-artifact@v7.0.1
        with:
          name: linux-release-bin
          path: |
            src/target/release/halod
            src/target/release/halod-gui

  # ── Test (Windows) ───────────────────────────────────────────────
  # Run tests + clippy first (fail fast), then build the release
  # binaries (daemon + egui UI + elevated broker) and cache them for the
  # installer step.
  test-windows:
    needs: [prepare, prepare-plugins]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - name: Download embedded plugin bundle
        uses: actions/download-artifact@v8.0.1
        with:
          name: official-plugin-bundle
          path: plugin-bundle

      - name: Set up MSYS2 (UCRT64)
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 #v2.32.0
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-cargo-about
            mingw-w64-ucrt-x86_64-python

      - name: Test + clippy
        shell: msys2 {0}
        run: |
          cd src
          cargo test --workspace
          cargo clippy --workspace --all-targets -- -D warnings

      - name: Build release binaries
        shell: msys2 {0}
        env:
          HALOD_REQUIRE_LICENSES: "1"
          HALOD_REQUIRE_PLUGIN_BUNDLE: "1"
          HALOD_OFFICIAL_PLUGIN_BUNDLE: ${{ github.workspace }}\plugin-bundle\official-plugins.bundle
          HALOD_OFFICIAL_PLUGIN_LICENSES: ${{ github.workspace }}\plugin-bundle\official-plugins-licenses.txt
        run: |
          cd src
          cargo build --release --workspace

      - name: Stage plugin tooling
        shell: pwsh
        run: |
          New-Item -ItemType Directory plugin-tools-windows
          Copy-Item src\target\release\halod-plugin-signing.exe `
            plugin-tools-windows\halod-plugin-signing-windows-x64.exe

      - name: Upload plugin tools
        uses: actions/upload-artifact@v7.0.1
        with:
          name: plugin-tools-windows
          path: plugin-tools-windows/*

      - name: Upload release binaries
        uses: actions/upload-artifact@v7.0.1
        with:
          name: windows-release-bin
          path: |
            src/target/release/halod.exe
            src/target/release/halod-gui.exe
            src/target/release/halod-broker.exe

  # ── Prepare ──────────────────────────────────────────────────────
  # Create the immutable release source commit before any build starts.
  prepare:
    needs: version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ needs.version.outputs.new_version }}
      release_sha: ${{ steps.release_commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: main

      - uses: cachix/install-nix-action@v31

      - uses: actions/checkout@v7.0.0
        with:
          repository: TimP4w/HaloDaemon-plugins
          ref: ${{ inputs.plugin_commit }}
          path: release-plugins
          fetch-depth: 0

      - name: Pin existing Nix package to the selected plugin commit
        run: |
          set -euo pipefail
          commit='${{ inputs.plugin_commit }}'
          branch='${{ inputs.plugin_branch }}'
          [[ "$commit" =~ ^[0-9a-fA-F]{40}$ ]]
          git -C release-plugins fetch origin "$branch"
          git -C release-plugins merge-base --is-ancestor "$commit" "origin/$branch"
          archive=$(mktemp -d)
          git -C release-plugins archive "$commit" | tar -x -C "$archive"
          hash=$(nix hash path --type sha256 --sri "$archive")
          python3 - "$commit" "$hash" <<'PY'
          import pathlib, re, sys
          commit, hash_ = sys.argv[1:]
          path = pathlib.Path("packaging/nix/package.nix")
          text = path.read_text()
          text, commits = re.subn(
              r'(repo = "HaloDaemon-plugins";\n    rev = ")[0-9a-f]{40}(")',
              lambda m: f"{m.group(1)}{commit}{m.group(2)}", text, count=1)
          text, hashes = re.subn(
              r'(repo = "HaloDaemon-plugins";\n    rev = "[0-9a-f]{40}";\n    hash = ")[^"]+(";)',
              lambda m: f"{m.group(1)}{hash_}{m.group(2)}", text, count=1)
          if commits != 1 or hashes != 1:
              sys.exit("Failed to pin official plugin source in package.nix")
          path.write_text(text)
          PY

      - name: Bump version in Cargo.toml and Cargo.lock
        run: |
          v="${{ needs.version.outputs.new_version }}"
          python3 - "$v" <<'PY'
          import pathlib, re, sys
          version = sys.argv[1]

          toml = pathlib.Path("src/Cargo.toml")
          text, n = re.subn(
              r'(\[workspace\.package\]\nversion = ")[^"]*(")',
              lambda m: f'{m.group(1)}{version}{m.group(2)}',
              toml.read_text(),
              count=1,
          )
          if n == 0:
              sys.exit("Failed to patch workspace version in src/Cargo.toml")
          toml.write_text(text)

          lock = pathlib.Path("src/Cargo.lock")
          locktext, n = re.subn(
              r'(name = "halod[^"]*"\nversion = ")[^"]*(")',
              lambda m: f'{m.group(1)}{version}{m.group(2)}',
              lock.read_text(),
          )
          lock.write_text(locktext)

          # Keep pkgver synchronized in the release commit. The immutable
          # source SHA is written after this commit exists (a commit cannot
          # contain its own hash).
          pkgbuild = pathlib.Path("packaging/arch/PKGBUILD")
          pbtext, n = re.subn(
              r'(?m)^(pkgver=).*$',
              lambda m: f'{m.group(1)}{version}',
              pkgbuild.read_text(),
              count=1,
          )
          if n == 0:
              sys.exit("Failed to patch pkgver in packaging/arch/PKGBUILD")
          pkgbuild.write_text(pbtext)
          PY

      - name: Create release commit
        id: release_commit
        run: |
          v="${{ needs.version.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/Cargo.toml src/Cargo.lock packaging/arch/PKGBUILD packaging/nix/package.nix
          git commit -m "chore: bump version to v${v}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Pin PKGBUILD to release commit
        run: |
          v="${{ needs.version.outputs.new_version }}"
          release_sha="${{ steps.release_commit.outputs.sha }}"
          python3 - "$release_sha" <<'PY'
          import pathlib, re, sys
          release_sha = sys.argv[1]
          if not re.fullmatch(r"[0-9a-f]{40}", release_sha):
              sys.exit(f"Invalid release commit SHA: {release_sha!r}")

          pkgbuild = pathlib.Path("packaging/arch/PKGBUILD")
          text, n = re.subn(
              r"(?m)^(source=.*#commit=)[^\"']+",
              lambda m: f"{m.group(1)}{release_sha}",
              pkgbuild.read_text(),
              count=1,
          )
          if n == 0:
              sys.exit("Failed to patch source commit in packaging/arch/PKGBUILD")
          pkgbuild.write_text(text)
          PY
          git add packaging/arch/PKGBUILD
          git commit -m "chore: pin Arch package for v${v}"
          git push origin HEAD:main

  # ── Official plugin snapshot ────────────────────────────────────
  # The branch establishes provenance; the supplied full SHA is the immutable
  # release input and is bundled once for every platform build.
  prepare-plugins:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - uses: actions/checkout@v7.0.0
        with:
          repository: TimP4w/HaloDaemon-plugins
          ref: ${{ inputs.plugin_commit }}
          path: official-plugins
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify plugin provenance and signature
        working-directory: src
        run: |
          set -euo pipefail
          commit='${{ inputs.plugin_commit }}'
          branch='${{ inputs.plugin_branch }}'
          [[ "$commit" =~ ^[0-9a-fA-F]{40}$ ]]
          git -C ../official-plugins fetch origin "$branch"
          git -C ../official-plugins merge-base --is-ancestor "$commit" "origin/$branch"
          cargo run -p halod-plugin-signing -- verify ../official-plugins \
            --trusted-key halodaemon-official-2026=tjbwm5X4f70e+soVNV1AfRyb/TtnEsNNl+93YMO6IhQ=

      - name: Create deterministic embedded bundle and license notice
        working-directory: src
        run: |
          set -euo pipefail
          cargo run -p halod-plugin-signing -- bundle ../official-plugins \
            --commit '${{ inputs.plugin_commit }}' \
            --output ../official-plugins.bundle
          {
            printf 'Official HaloDaemon plugin snapshot\n'
            printf 'Branch: %s\nCommit: %s\n\n' '${{ inputs.plugin_branch }}' '${{ inputs.plugin_commit }}'
            find ../official-plugins/LICENSES -maxdepth 1 -type f -print0 | sort -z | xargs -0 -r cat
          } > ../official-plugins-licenses.txt
          mkdir -p ../official-plugins-license-files
          cp ../official-plugins/LICENSES/* ../official-plugins-license-files/

      - name: Upload plugin bundle
        uses: actions/upload-artifact@v7.0.1
        with:
          name: official-plugin-bundle
          path: |
            official-plugins.bundle
            official-plugins-licenses.txt
            official-plugins-license-files/

  # ── Windows installer ────────────────────────────────────────────
  # Takes the already-built Windows binaries from the test phase and
  # packages them into an Inno Setup installer. No Rust rebuild.
  windows-installer:
    needs: [test-windows, prepare, prepare-plugins]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - name: Download Windows release binaries
        uses: actions/download-artifact@v8.0.1
        with:
          name: windows-release-bin
          path: src/target/release

      - name: Download plugin license notice
        uses: actions/download-artifact@v8.0.1
        with:
          name: official-plugin-bundle
          path: plugin-bundle

      - name: Set up MSYS2 (UCRT64) for ffmpeg
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 #v2.32.0
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-ntldd

      - name: Resolve UCRT64 path
        shell: msys2 {0}
        run: echo "UCRT64=$(cygpath -w /ucrt64)" >> "$GITHUB_ENV"

      - name: Stage release files
        shell: pwsh
          run: ./packaging/windows/stage-release.ps1 -Ucrt64 "$env:UCRT64" -PluginLicensesDir plugin-bundle

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DAppVersion=${{ needs.prepare.outputs.new_version }} `
            packaging\windows\halod.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: halod-setup-x64
          path: packaging/windows/Output/halod-setup-x64.exe

  # ── Linux tarball ────────────────────────────────────────────────
  # Takes the already-built Linux binaries from the test phase and
  # packages them into a tarball. No Rust rebuild.
  linux-tarball:
    needs: [test-linux, prepare, prepare-plugins]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - name: Download Linux release binaries
        uses: actions/download-artifact@v8.0.1
        with:
          name: linux-release-bin
          path: src/target/release

      - name: Download plugin license notice
        uses: actions/download-artifact@v8.0.1
        with:
          name: official-plugin-bundle
          path: plugin-bundle

      - name: Stage tarball
        run: |
          d=halod-linux-x64
          mkdir -p "$d/udev"
          cp src/target/release/halod "$d/"
          cp src/target/release/halod-gui "$d/"
          cp udev/60-halod.rules "$d/udev/"
          mkdir -p "$d/ThirdPartyLicenses/Plugins"
          cp plugin-bundle/official-plugins-licenses.txt "$d/ThirdPartyLicenses/Plugins/NOTICE.txt"
          cp plugin-bundle/official-plugins-license-files/* "$d/ThirdPartyLicenses/Plugins/"
          cat > "$d/INSTALL.txt" <<'EOF'
          HaloDaemon - Linux binaries

          ===========================================================
          DISCLAIMER - USE AT YOUR OWN RISK
          ===========================================================
          This software communicates directly with low-level hardware
          interfaces (HID, SMBus/I2C, SuperIO port I/O, etc.). Sending
          incorrect data to peripherals or your motherboard can cause
          malfunction, data loss, or IRREPARABLE DAMAGE TO YOUR
          PERIPHERALS OR PC. It is provided "as is", without warranty
          of any kind. You assume all responsibility for any damage
          that results from its use.
          ===========================================================

          1. Install the runtime libraries (see the project README's
             "Production Installation" section for your distro):
               hidapi libusb pipewire libudev wayland
               mesa (or your distro's OpenGL/EGL provider)
          2. Install the udev rules:
               sudo cp udev/60-halod.rules /etc/udev/rules.d/
               sudo udevadm control --reload-rules && sudo udevadm trigger
          3. Add your user to the i2c group for SMBus/DRAM RGB:
               sudo usermod -aG i2c $USER   (then re-login)
          4. Run ./halod, then ./halod-gui.

          On NixOS, use the flake instead — see the project README.
          EOF
          tar czf halod-linux-x64.tar.gz "$d"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: halod-linux-x64
          path: halod-linux-x64.tar.gz

  # ── Ubuntu / Debian .deb ─────────────────────────────────────────
  # Packages the already-built Linux binaries into a .deb via cargo-deb.
  # No Rust rebuild. Runtime library deps are auto-detected (dpkg-shlibdeps);
  # the GUI's dlopened libs are declared in [package.metadata.deb] in
  # src/daemon/Cargo.toml.
  linux-deb:
    needs: [test-linux, prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      # dtolnay/rust-toolchain has no versioned releases: `@stable` is a rolling
      # ref by design (tracks current stable Rust). Intentionally left unpinned;
      # pin to a commit SHA here if a fully reproducible toolchain is required.
      - uses: dtolnay/rust-toolchain@stable

      - name: Download Linux release binaries
        uses: actions/download-artifact@v8.0.1
        with:
          name: linux-release-bin
          path: src/target/release

      # upload/download-artifact does not preserve the executable bit.
      - name: Restore executable bit
        run: chmod +x src/target/release/halod src/target/release/halod-gui

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb
        run: cargo deb --no-build --no-strip --manifest-path src/daemon/Cargo.toml

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: halod-deb
          path: src/target/debian/*.deb

  # ── Fedora .rpm ──────────────────────────────────────────────────
  # Packages the already-built Linux binaries into a .rpm via
  # cargo-generate-rpm. No Rust rebuild. `rpm` is installed so auto-req can
  # run find-requires; the resulting soname Requires are distro-portable, so
  # an Ubuntu-built binary resolves on Fedora. The GUI's dlopened libs are
  # declared explicitly in [package.metadata.generate-rpm] in src/daemon/Cargo.toml.
  linux-rpm:
    needs: [test-linux, prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Download Linux release binaries
        uses: actions/download-artifact@v8.0.1
        with:
          name: linux-release-bin
          path: src/target/release

      - name: Restore executable bit
        run: chmod +x src/target/release/halod src/target/release/halod-gui

      - name: Install rpm tooling and cargo-generate-rpm
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rpm
          cargo install cargo-generate-rpm --locked

      - name: Build .rpm
        working-directory: src
        run: cargo generate-rpm -p daemon

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: halod-rpm
          path: src/target/generate-rpm/*.rpm

  # ── Publish ──────────────────────────────────────────────────────
  # Creates the GitHub release with all platform artifacts attached.
  publish:
    needs: [prepare, prepare-plugins, windows-installer, linux-tarball, linux-deb, linux-rpm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Tag tested release commit
        run: |
          v="${{ needs.prepare.outputs.new_version }}"
          git tag "v${v}" "${{ needs.prepare.outputs.release_sha }}"
          git push origin "v${v}"

      - name: Compute SHA-256 and build release notes
        run: |
          v="${{ needs.prepare.outputs.new_version }}"
          DEB=$(ls artifacts/halod-deb/*.deb)
          RPM=$(ls artifacts/halod-rpm/*.rpm)
          W32_HASH=$(sha256sum artifacts/halod-setup-x64/halod-setup-x64.exe | cut -d' ' -f1)
          LINUX_HASH=$(sha256sum artifacts/halod-linux-x64/halod-linux-x64.tar.gz | cut -d' ' -f1)
          DEB_HASH=$(sha256sum "$DEB" | cut -d' ' -f1)
          RPM_HASH=$(sha256sum "$RPM" | cut -d' ' -f1)
          cat > release-notes.md <<EOF
          ## HaloDaemon v${v}

          > [!WARNING]
          > **Disclaimer - use at your own risk.** This software communicates directly with
          > low-level hardware interfaces (HID, SMBus/I2C, SuperIO port I/O, etc.). Sending
          > incorrect data to peripherals or your motherboard can cause malfunction, data
          > loss, or **irreparable damage to your peripherals or PC**. It is provided "as is",
          > without warranty of any kind. You assume all responsibility for any damage that
          > results from its use.

          ### Checksums (SHA-256)

          | Artifact | Hash |
          |---|---|
          | \`halod-setup-x64.exe\` | \`${W32_HASH}\` |
          | \`halod-linux-x64.tar.gz\` | \`${LINUX_HASH}\` |
          | \`$(basename "$DEB")\` | \`${DEB_HASH}\` |
          | \`$(basename "$RPM")\` | \`${RPM_HASH}\` |
          EOF

      - name: Generate SHA256SUMS and detached signature
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          mkdir -p release
          cp artifacts/halod-setup-x64/halod-setup-x64.exe release/
          cp artifacts/halod-linux-x64/halod-linux-x64.tar.gz release/
          cp artifacts/halod-deb/*.deb release/
          cp artifacts/halod-rpm/*.rpm release/
          cp artifacts/plugin-tools-linux/* release/
          cp artifacts/plugin-tools-windows/* release/
          cp artifacts/official-plugin-bundle/official-plugins.bundle release/
          cp artifacts/official-plugin-bundle/official-plugins-licenses.txt release/
          ( cd release && sha256sum -- * > SHA256SUMS )
          echo "release/SHA256SUMS:"; cat release/SHA256SUMS
          if [ -n "${GPG_PRIVATE_KEY}" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
            KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/{print $5; exit}')
            gpg --batch --yes --pinentry-mode loopback \
              ${GPG_PASSPHRASE:+--passphrase "$GPG_PASSPHRASE"} \
              --local-user "$KEYID" --detach-sign --armor \
              --output release/SHA256SUMS.asc release/SHA256SUMS
            echo "Wrote detached signature release/SHA256SUMS.asc"
          else
            echo "GPG_PRIVATE_KEY not set — skipping detached signature"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b #v3.0.1
        with:
          tag_name: v${{ needs.prepare.outputs.new_version }}
          name: HaloDaemon ${{ needs.prepare.outputs.new_version }}
          body_path: release-notes.md
          # SHA256SUMS.asc is only present when GPG_PRIVATE_KEY is configured;
          # softprops/action-gh-release defaults to fail_on_unmatched_files: false,
          # so its absence is a warning, not a failure.
          files: |
            artifacts/halod-setup-x64/halod-setup-x64.exe
            artifacts/halod-linux-x64/halod-linux-x64.tar.gz
            artifacts/halod-deb/*.deb
            artifacts/halod-rpm/*.rpm
            artifacts/plugin-tools-linux/halod-plugin-signing-linux-x64
            artifacts/plugin-tools-linux/halod-plugin-test-linux-x64
            artifacts/plugin-tools-windows/halod-plugin-signing-windows-x64.exe
            artifacts/official-plugin-bundle/official-plugins.bundle
            artifacts/official-plugin-bundle/official-plugins-licenses.txt
            release/SHA256SUMS
            release/SHA256SUMS.asc
