version = 1
SPDX-PackageName = "HaloDaemon"
SPDX-PackageSupplier = "Timucin Besken <beskent@gmail.com>"
SPDX-PackageDownloadLocation = "https://github.com/TimP4w/HaloDaemon"

[[annotations]]
path = "**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Timucin Besken <beskent@gmail.com>"
SPDX-License-Identifier = "GPL-3.0-or-later"

[[annotations]]
path = "src/daemon/assets/NotoSans-Regular.ttf"
precedence = "override"
SPDX-FileCopyrightText = "2022 The Noto Project Authors (https://github.com/notofonts/latin-greek-cyrillic)"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "src/daemon/assets/NotoSans-Regular-LICENSE.txt"
precedence = "override"
SPDX-FileCopyrightText = "2022 The Noto Project Authors (https://github.com/notofonts/latin-greek-cyrillic)"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = ["pwnio/LpcIO.bin", "pwnio/SmbusI801.bin", "pwnio/SmbusPIIX4.bin", "pwnio/COPYING"]
precedence = "override"
SPDX-FileCopyrightText = "2023 namazso <admin@namazso.eu>"
SPDX-License-Identifier = "LGPL-2.1-or-later"

[[annotations]]
path = "refs/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "See individual project licenses in each subdirectory."
SPDX-License-Identifier = "LicenseRef-scancode-unknown-license-reference"

[[annotations]]
path = "src/**/target/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Timucin Besken <beskent@gmail.com>"
SPDX-License-Identifier = "GPL-3.0-or-later"
