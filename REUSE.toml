version = 1
SPDX-PackageName = "HaloDaemon"
SPDX-PackageSupplier = "Timucin Besken <beskent@gmail.com>"
SPDX-PackageDownloadLocation = "https://github.com/TimP4w/HaloDaemon"

[[annotations]]
path = "**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Timucin Besken <beskent@gmail.com>"
SPDX-License-Identifier = "GPL-3.0-or-later"

[[annotations]]
path = ["src/assets/fonts/NotoSans-Regular.ttf", "src/assets/fonts/NotoSans-Regular-LICENSE.txt"]
precedence = "override"
SPDX-FileCopyrightText = "2022 The Noto Project Authors (https://github.com/notofonts/latin-greek-cyrillic)"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = ["src/assets/fonts/JetBrainsMono-*.ttf", "src/assets/fonts/JetBrainsMono-Regular-LICENSE.txt"]
precedence = "override"
SPDX-FileCopyrightText = "2020 The JetBrains Mono Project Authors (https://github.com/JetBrains/JetBrainsMono)"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "src/assets/fonts/InterTight-*.ttf"
precedence = "override"
SPDX-FileCopyrightText = "2016 The Inter Project Authors (https://github.com/rsms/inter)"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "src/ui/assets/icons/devices/computer.svg"
precedence = "override"
SPDX-FileCopyrightText = "2019-2024 The Bootstrap Authors (https://github.com/twbs/icons)"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = "pwnio/**"
precedence = "override"
SPDX-FileCopyrightText = "2023 namazso <admin@namazso.eu>"
SPDX-License-Identifier = "LGPL-2.1-or-later"

[[annotations]]
path = ["packaging/windows/FFmpeg-LICENSE.md", "packaging/windows/FFmpeg-README.txt"]
precedence = "override"
SPDX-FileCopyrightText = "The FFmpeg developers <https://ffmpeg.org>"
SPDX-License-Identifier = "LGPL-2.1-or-later"
